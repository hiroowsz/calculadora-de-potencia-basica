<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de potência</title>
</head>
<style>
    body{
    background-color: rgb(160, 68, 247);
    }
    h1{
    font: normal 20pt arial;
    }
    div{
    font:normal 20pt arial;
    }
    p{
    font:normal 15pt arial;
    margin-top: 20px;
    }
    img{
    margin-top: 150px;
    }
</style>
<body>
<h1 id="h1texto">Calculadora de potência</h1>
<input type="number" name="txtn1" id="txtn1"> ** 
<input type="number" name="txtn2" id="txtn2"> <!-- nao esquece de conferir se tem ID, value e name-->
<input type="button" value="Efetuar a potência" onclick="efetuar()"> <!--NÃO ESUECE DE POR VALUEEEEE-->

<div id="resultado">Aqui vai estar o resultado.</div>
<img src="https://i.ibb.co/ZH8zrV8/image-2022-02-24-192740.png" width="300px" height="300px" alt="jennie deusa!">
<p>Desenvolvido por Ramon Pinheiro</p>
<script>
    let nome = prompt(`Qual é o seu nome?`);
    document.querySelector("h1#h1texto").innerHTML = `Seja bem vindo a calculadora de potência, ${nome}!`
    function efetuar(){
    let tn1 = document.querySelector("input#txtn1"); // não esquece que tu tem que pegar o conteúdo do txtn1 antes 
    let tn2 = document.querySelector("input#txtn2");
    let res = document.querySelector("div#resultado"); // ta pegando o valor do resultado
    let n1 = Number(tn1.value)// pega o valor contido em tn1
    let n2 = Number(tn2.value)// pega o valor contido em tn2
    let resultadopotencia = n1**n2; // pra mudar o conteúdo da div, tu tem que pegar a let e a div com o ponto entre as 2
    res.innerHTML = `A potência ${n1} do número ${n2} é <strong>${resultadopotencia}</strong>!`; // ta transformando o valor do resultado no texto do resultado
    }

    /* NAO ESQUECE DE POR DOCUMENT ANTES DOS QUERY SELECTOR!!!!!*/
</script>    
</body>
</html>
